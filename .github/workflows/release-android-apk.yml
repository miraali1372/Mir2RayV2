name: Publish Android APK

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to publish, for example v1.0.0
        required: true
        default: v1.0.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web and sync Android
        run: npm run build:android

      - name: Derive Android version from tag
        id: android_version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          VERSION_NUM="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH _ <<< "$VERSION_NUM"
          MAJOR="${MAJOR//[^0-9]/}"
          MINOR="${MINOR//[^0-9]/}"
          PATCH="${PATCH//[^0-9]/}"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          if [ "$VERSION_CODE" -lt 1 ]; then
            VERSION_CODE=1
          fi
          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Download Android native library
        run: |
          mkdir -p android/app/libs
          curl --fail --location --retry 3 \
            --output android/app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.5.19/libv2ray.aar

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        env:
          MIR2RAY_VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
          MIR2RAY_VERSION_CODE: ${{ steps.android_version.outputs.version_code }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Mir2rayV2 ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: RELEASE_NOTES.md
          overwrite_files: true
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
